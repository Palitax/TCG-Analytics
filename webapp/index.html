<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TCG Card Tracker</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#090d16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <!-- Dynamic panel viewport container -->
  </div>
  
  <div id="cache-recovery-widget" style="display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(0,0,0,0.95); border: 1.5px solid #fb8500; border-radius: 12px; padding: 16px; box-shadow: 0 10px 40px rgba(251,133,0,0.4); text-align: center; font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 90%; width: 320px;">
    <p style="color: #fff; font-size: 0.85rem; margin: 0 0 12px 0; line-height: 1.4; font-weight: 500;">Seite scheint festzuhängen oder lädt nicht.</p>
    <button onclick="clearCacheAndReload()" style="background: #fb8500; border: none; border-radius: 8px; color: #000; font-size: 0.82rem; font-weight: 700; padding: 10px 14px; cursor: pointer; width: 100%; transition: opacity 0.2s;">
      Cache leeren & neu laden
    </button>
  </div>

  <script>
    function clearSWAndReload() {
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      if (window.caches) {
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }
      
      setTimeout(() => {
        window.location.reload(true);
      }, 250);
    }

    function clearCacheAndReload() {
      try { localStorage.clear(); } catch(e){}
      try { sessionStorage.clear(); } catch(e){}
      clearSWAndReload();
    }

    (function() {
      var widget = document.getElementById('cache-recovery-widget');
      var timeout = setTimeout(function() {
        var app = document.getElementById('app');
        if (!app || app.innerHTML.trim() === '' || app.querySelector('.spinner-box')) {
          widget.style.display = 'block';
        }
      }, 5000); // 5 seconds timeout fallback

      window.addEventListener('error', function(e) {
        const msg = e.message || '';
        if (msg && (
          msg.indexOf('dynamically imported module') !== -1 ||
          msg.indexOf('Failed to fetch') !== -1 ||
          msg.indexOf('Importing a module script') !== -1
        )) {
          console.warn("Chunk load error detected, auto-clearing SW cache & reloading...", msg);
          clearSWAndReload();
          return;
        }
        widget.style.display = 'block';
        clearTimeout(timeout);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const msg = e.reason?.message || '';
        if (msg && (
          msg.indexOf('dynamically imported module') !== -1 ||
          msg.indexOf('Failed to fetch') !== -1 ||
          msg.indexOf('Importing a module script') !== -1
        )) {
          console.warn("Unhandled chunk rejection detected, auto-clearing SW cache & reloading...", msg);
          clearSWAndReload();
          return;
        }
        widget.style.display = 'block';
        clearTimeout(timeout);
      });
    })();
  </script>

  <script type="module" src="/src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          reg.update().catch(err => console.log('ServiceWorker update check failed:', err));
        }).catch(err => {
          console.error('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
