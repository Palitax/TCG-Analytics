<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Cardmarket Price Tracker Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-box">
        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 17L9 11L13 15L21 7" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 7H16" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M21 7V12" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Tracker Pro</span>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <!-- Auth State Loading -->
    <div id="state-loading" class="state-panel active">
      <div class="spinner-box">
        <div class="spinner"></div>
        <p>Verbindung wird hergestellt...</p>
      </div>
    </div>

    <!-- Auth State: Logged Out -->
    <div id="state-logged-out" class="state-panel">
      <div class="welcome-box">
        <h2>Willkommen</h2>
        <p>Verbinde dich mit deinem Account, um Preise live mit der geteilten Datenbank zu synchronisieren.</p>
        
        <button id="btn-login" class="btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.74-.08-1.3-.176-1.859H12.24z"/>
          </svg>
          Mit Google einloggen
        </button>
      </div>
    </div>

    <!-- Auth State: Logged In -->
    <div id="state-logged-in" class="state-panel">
      <!-- Profile Card -->
      <div class="profile-card">
        <div class="avatar">
          <svg class="avatar-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <div class="profile-info">
          <span class="user-email" id="user-email">user@domain.com</span>
          <span class="user-badge">Verbunden</span>
        </div>
        <button id="btn-logout" class="btn-icon-only" title="Ausloggen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>

      <!-- Settings Panel -->
      <div class="settings-box">
        <label for="select-condition" class="settings-label">Gewünschter Zustand (Target Condition):</label>
        <div class="select-wrapper">
          <select id="select-condition">
            <option value="MT">Mint (MT)</option>
            <option value="NM" selected>Near Mint (NM)</option>
            <option value="EX">Excellent (EX)</option>
            <option value="GD">Good (GD)</option>
            <option value="LP">Light Played (LP)</option>
            <option value="PL">Played (PL)</option>
            <option value="PO">Poor (PO)</option>
          </select>
        </div>
        <p class="settings-note">Preisscanner sucht bevorzugt nach Händlern aus Deutschland.</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
